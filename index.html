<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>iStock</title>
    <link rel="icon" type="image/x-icon" href="images/Visuals/Intro/iStock-logo.jpg">
</head>

<body>
    <header>

    </header>

    <main>
        <section id="startingScreen">
            <div id="backgroundImage">
                <h1>Stock Game</h1>

                <section id="startButtons">
                    <button type="button" id="startGame">Play Game</button>
                    <button type="button">Achievements</button>
                    <button type="button">Credits</button>

                    <section id="tempNavForDevs">
                        <label for="sceneNavigate">Go to a specific scene - For dev use</label>
                        <input type="text" id="sceneNavigate" placeholder="Input the ID of the desired scene">
                        <button type="button" id="submitSceneNavigate"></button>
                    </section>
                </section>
            </div>
        </section>

        <section id="actualGame" class="hidden">
            <section id="mainContent">
                <img src="" id="mainVisual">

                <section id="dialogueBox">
                    <p id="speakerTag">Speaker</p>
                    <div id="dialogueBoxStyle">
                        <p id="dialogue">Text Goes Here</p>
                    </div>
                </section>

                <section id="inventoryList" class="hidden">
                    <ul>

                    </ul>
                </section>

                <button id="next" type="button">Next</button>

                <ul id="optionsRow">

                </ul>
            </section>

            <section id="healthbarSection">
                <ul id="healthbar" filledHeartImg="images/Mechanics/filledHeart.svg" unfilledHeartImg="images/Mechanics/unfilledHeart.svg">
                    <li active="true" class="heart"><img src="images/Mechanics/filledHeart.svg"></li>
                    <li active="true" class="heart"><img src="images/Mechanics/filledHeart.svg"></li>
                    <li active="true" class="heart"><img src="images/Mechanics/filledHeart.svg"></li>
                    <li active="true" class="heart"><img src="images/Mechanics/filledHeart.svg"></li>
                    <li active="true" class="heart"><img src="images/Mechanics/filledHeart.svg"></li>
                </ul>
            </section>

            <button id="inventoryButton">
                <img src="images/Mechanics/inventoryButton.png">
            </button>
        </section>
    </main>
    <footer>

    </footer>

    <script src="JavaScript/gameLogic.js" defer></script>
    <script src="JavaScript/UIController.js" type="module"></script>
    </section>
</body>

</html>
