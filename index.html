<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>iStock</title>
    <link rel="icon" type="image/x-icon" href="images/Visuals/Intro/iStock-logo.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header>

    </header>

    <main>
        <section id="startingScreen">
            <div id="backgroundImage">
                <h1>Stock Game</h1>

                <section id="startButtons">
                    <button type="button" id="startGame">Play Game</button>
                    <button type="button">Achievements</button>
                    <button type="button">Credits</button>

                    <section id="tempNavForDevs">
                        <label for="sceneNavigate">Go to a specific scene - For dev use</label>
                        <input type="text" id="sceneNavigate" placeholder="Input the ID of the desired scene">
                        <button type="button" id="submitSceneNavigate"></button>
                    </section>
                </section>
            </div>
        </section>


        <section id="vertical-pop-up" class="hidden">
            <img src="images\Other\orientation-phone-image.png">
            <p>Please orientate your phone into landscape mode to continue playing.</p>
        </section>

        <section id="actualGame" class="hidden">
            <section id="mainContent">
                <section id="visuals">
                    <img src="/images/Visuals/Intro/BLACK SCREEN.png" alt='Game visual' id="mainVisual">
                    <section id="dialogueBox">
                        <p id="speakerTag">Speaker</p>
                        <div id="dialogueBoxStyle">
                            <p id="dialogue">Text Goes Here</p>
                        </div>
                    </section>

                    <section id="inventorySection" class="hidden">
                        <p>Inventory</p>
                        <ul id="inventory">

                        </ul>
                    </section>

                    <button id="next" type="button">Next</button>

                    <ul id="optionsRow">

                    </ul>
                </section>

                <!-- Puzzles lay below... -->
                <section id="rockPaperScissorsPuzzle" class="hidden">

                    <div id="choices">
                        <button onclick="playGame('rock')">Rock</button>
                        <button onclick="playGame('paper')">Paper</button>
                        <button onclick="playGame('scissors')">Scissors</button>
                    </div>

                    <div id="resultDisplay"></div>

                    <aside id="scores">
                        <div class="scoreDisplay">John's Score
                            <span id="playerScoreDisplay">0</span>
                        </div>

                        <div class="scoreDisplay">James' Score
                            <span id="enemyScoreDisplay">0</span>
                        </div>
                    </aside>
                    <section id="rockPaperScissorsDuel">
                        <aside>
                            <img id="playerHand" src="images/Other/john-rock-removebg-preview.png"
                                alt="john-hand-position">
                            <div id="playerDisplay">Stock de John:</div>

                        </aside>

                        <aside>
                            <img id="enemyHand" src="images/Other/john-rock-removebg-preview.png"
                                alt="enemy-hand-position">
                            <div id="enemyDisplay">Stock de James:</div>
                        </aside>
                    </section>
                </section>

                <section id="decipherPuzzle" class="hidden">

                </section>

                <section id="holesAndShapesPuzzle" class="hidden">
                    <p>What hole does this shape go in?</p>
                    <div id="draggableShapeContainer">

                    </div>

                    <ul id="boxOfHoles">
                        <li id="triangleHole" class="imgContainer"><img class="shapeHole"
                                src="images/Mechanics/Puzzles/holesAndShapes/triangleHole.svg" alt="Triangle hole"></li>
                        <li id="circleHole" class="imgContainer"><img class="shapeHole"
                                src="images/Mechanics/Puzzles/holesAndShapes/circleHole.svg" alt="Circle hole"></li>
                        <li id="squareHole" class="imgContainer"><img class="shapeHole"
                                src="images/Mechanics/Puzzles/holesAndShapes/squareHole.svg" alt="Square hole"></li>
                        <li id="starHole" class="imgContainer"><img class="shapeHole"
                                src="images/Mechanics/Puzzles/holesAndShapes/starHole.svg" alt="Star hole"></li>
                    </ul>

                    <aside id="GL2Profile">
                        <div id="chatBox">
                            <p id="GL2dialogue"></p>
                            <button type="button" id="skipGL2dialogue">Next</button>
                        </div>
                        <img src="images/Visuals/Layer1/guyFromLayer2Profile.jpg" alt="Guy from Layer 2">
                    </aside>
                </section>
            </section>

            <section id="healthbarSection">
                <ul id="healthbar">
                    <li class="heart interactableWithPH"><img src="images/Mechanics/filledHeart.svg" alt="heart"></li>
                    <li class="heart interactableWithPH"><img src="images/Mechanics/filledHeart.svg" alt="heart"></li>
                    <li class="heart interactableWithPH"><img src="images/Mechanics/filledHeart.svg" alt="heart"></li>
                    <li class="heart interactableWithPH"><img src="images/Mechanics/filledHeart.svg" alt="heart"></li>
                    <li class="heart interactableWithPH"><img src="images/Mechanics/filledHeart.svg" alt="heart"></li>
                </ul>
            </section>

            <button id="inventoryButton" class="interactableWithPH">
                <img src="images/Mechanics/inventoryButton.png">
            </button>
        </section>

        <button id="historyButton" class="interactableWithPH">

        </button>

        <dialog id="gameOverPopup" class="hidden">
            <p>Game Over!</p>
            <p id="gameOverMessage"></p>
            <div id="gameOverOptions">
                <button type="button" id="retryChoice">Retry</button>
                <button type="button" id="restartGame">Start Over</button>
            </div>
        </dialog>
    </main>
    <footer>

    </footer>

    <script src="JavaScript/UIController.js" type="module"></script>
    <script src="JavaScript/gameLogic.js" type="module"></script>
    <!--Below script alows drag and drop listeners to work with mobile-->
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.min.js"></script>
    </section>


    <div class="circle">
        <img src="images\Other\red-hand-cursor.png" alt="red-hand-cursor" width="75px" height="75px">
    </div>

</body>

</html>
